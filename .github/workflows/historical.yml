name: Carga Histórica

on:
  workflow_dispatch:
    inputs:
      meses:
        description: 'Cuántos meses hacia atrás (default: 24)'
        required: false
        default: '24'

jobs:
  historical:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Restaurar progreso
        uses: actions/cache@v4
        with:
          path: .historical-progress.json
          key: historical-progress-${{ github.run_id }}
          restore-keys: |
            historical-progress-

      - name: Correr scraper histórico
        run: npm run historical
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Guardar progreso
        if: always()
        uses: actions/cache@v4
        with:
          path: .historical-progress.json
          key: historical-progress-${{ github.run_id }}
